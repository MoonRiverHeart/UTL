services:
  postgres:
    image: postgres:15-alpine
    container_name: utl-postgres
    environment:
      POSTGRES_USER: utl
      POSTGRES_PASSWORD: utl123
      POSTGRES_DB: utl
    ports:
      - "5432:5432"
    volumes:
      - utl-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U utl"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  utl-postgres-data: